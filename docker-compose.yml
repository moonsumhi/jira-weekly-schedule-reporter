name: jira-reporter

services:
  backend:
    image: ${HARBOR_URL:-x.x.x.x(HARBOR_URL)}/dev/jira-reporter-backend:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BO_BASE_IMAGE:-python:3.12-slim}
        SKIP_SYS_DEPS: ${BO_SKIP_SYS_DEPS:-false}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    container_name: jira-backend
    ports:
      - "8000:8000"
    env_file:
      - ./app/secret/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://${APP_DB_USER}:${APP_DB_PASS}@mongo:27017/?authSource=${APP_DB_NAME}
      - APP_DB_NAME=${APP_DB_NAME}
      - PILOT_ENABLED=${PILOT_ENABLED}
    volumes:
      - ./app/secret:/app/app/secret:ro
      - ./data/uploads:/app/uploads

  frontend:
    image: ${HARBOR_URL:-x.x.x.x(HARBOR_URL)}/dev/jira-reporter-frontend:${TAG:-latest}
    build:
      context: .
      dockerfile: frontend/optool/Dockerfile
      args:
        NODE_BASE_IMAGE: ${BO_FE_NODE_BASE_IMAGE:-node:22-alpine}
        NGINX_BASE_IMAGE: ${BO_FE_NGINX_BASE_IMAGE:-nginx:alpine}
        SKIP_NPM_INSTALL: ${BO_FE_SKIP_NPM_INSTALL:-false}
    container_name: jira-frontend
    ports:
      - "9000:80"
      - "9002:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      # Expose only if you want to connect from host tools (Compass, etc.)
      - "27017:27017"
    volumes:
      # Persistent data on host filesystem
      - ./data/mongodb:/data/db
      # One-time initialization scripts (create app db + user)
      - ./scripts:/docker-entrypoint-initdb.d:ro

  pilot:
    build:
      context: ./pilot
      dockerfile: Dockerfile
    container_name: pilot
    ports:
      - "9091:9090"
    env_file:
      - ./app/secret/.env
      # - ${HOME}/.config/jira-reporter/claude-token.env
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Pilot AI}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-pilot@localhost}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Pilot AI}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-pilot@localhost}
      - HOME=/home/pilot
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=url.https://x-access-token:${GITHUB_TOKEN}@github.com/.insteadOf
      - GIT_CONFIG_VALUE_0=https://github.com/
      # - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    volumes:
      - .:/workspace  # rw for code modifications
      # - ${CLAUDE_CONFIG_PATH:-~/.claude}:/home/pilot/.claude  # Claude CLI auth (rw for debug logs)
      # - ${CLAUDE_JSON_PATH:-~/.claude.json}:/home/pilot/.claude.json  # Claude CLI config
      # - ${SSH_KEY_PATH:-~/.ssh}:/home/pilot/.ssh:ro  # SSH keys for git push

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
