# Cloudflare IP 대역 신뢰 (실제 클라이언트 IP 복원)
# 프록시 부분 
# cludeflare에서 공인한 ip들
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
# 여기까지 cloudflare가 공인한 ip 들 자세한 부분은 https://www.cloudflare.com/ko-kr/ips/ 여기에 있음

#set_real_ip_from 127.0.0.1; # 어차피 도커로 우회해서 들어가기 때문에 해당 부분은 주석 처리해도 됨
# 사내 투명 프록시(Zscaler/Netskope 등) 및 Docker 브리지 대역 신뢰
# X-Forwarded-For 헤더로 실제 클라이언트 IP 복원
set_real_ip_from 151.101.0.0/16;  # Fastly (사내 프록시 CDN)
set_real_ip_from 192.168.0.0/16;  # Docker Desktop Mac 브리지
set_real_ip_from 172.16.0.0/12;   # Docker 내부망
set_real_ip_from 10.0.0.0/8;      # Docker 내부망
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80;

    server_name _;

    client_max_body_size 4G;

    allow 210.179.64.239;    # NSAOUT ip
    allow 210.179.96.70;     # kt vpn 내부 인터넷망?
    allow 218.148.191.162;   # kt vpn 내부 인터넷망?
    allow 192.168.0.0/16;    # 도커 내부망 192.168.x.x (Docker Desktop Mac)
    allow 172.16.0.0/12;     # 도커 내부망 172.16~31.x.x (172.18.0.0/16 포함)
    allow 10.0.0.0/8;        # 도커 내부망 10.x.x.x
    allow 151.101.192.0/22;  # Mac→Docker 연결 경유 IP (Cloudflare/Fastly 인프라)
    allow 160.79.104.10;
    deny all;


    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /webhooks/ {
        proxy_pass http://pilot:9090/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
